<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Curitiba-EcoWatch</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px;
            background: #f4f4f4;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }

        .success {
            color: #2ecc71;
        }

        .warning {
            color: #f1c40f;
        }

        .danger {
            color: #e74c3c;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Clima em Curitiba</h2>
        <p style="font-size: 48px; margin: 10px 0;">18.8°C</p>
        <p><i>Nublado ou parcialmente nublado</i></p>
        <hr>
        <h3 class="success">Treino Outdoor (Parque Barigui liberado!)</h3>
    </div>
</body>

</html>
