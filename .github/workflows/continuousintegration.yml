name: Continuous Integration
on: 
  pull_request:
    branches: 
      - main

jobs:
  testes_e_lint:
    name: Validar Código e Testes
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          
      - name: Rodar Testes Unitários (Pytest)
        run: pytest test_analyzer.py

      - name: Python Lint Code Scanning Action
        uses: advanced-security/python-lint-code-scanning-action@v1.1.3
        with:
          linter: pylint
          
  docker:
    name: Validar Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: user/app:latest

  discord:
    name: Enviar Alerta
    runs-on: ubuntu-latest
    needs: [testes_e_lint, docker] # Aguarda os testes e o docker terminarem
    if: always() # Garante que o Discord vai avisar mesmo se os testes falharem
    steps:
      - uses: actions/checkout@v4

      - name: Discord Commits
        uses: Sniddl/discord-commits@v1.6
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}