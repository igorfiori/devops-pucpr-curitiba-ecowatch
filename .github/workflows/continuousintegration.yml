name: Continuous Integration
on: 
  pull_request:
    branches: 
      - main

jobs:
  testes_e_lint: # Renomeado para bater com o "needs" do Discord
    name: Validar Código e Testes
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependências e Pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
          
      - name: Rodar Testes Unitários (Pytest)
        run: pytest

      - name: Python Lint Code Scanning Action
        uses: advanced-security/python-lint-code-scanning-action@v1.1.3
        with:
          linter: pylint
          
  docker:
    name: Validar Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code # ADICIONADO PARA NÃO DAR ERRO NO DOCKERFILE
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: user/app:latest

  discord:
    name: Enviar Alerta
    runs-on: ubuntu-latest
    needs: [testes_e_lint, docker] # Agora ele vai achar os dois jobs corretamente!
    if: always() 
    steps:
      - name: Enviar mensagem direta para o Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"**Pipeline EcoWatch Finalizado!** \n👤 **Autor:** ${{ github.actor }} \n🔗 **Acesse:** https://github.com/${{ github.repository }}/pulls\"}" \
          $DISCORD_WEBHOOK