name: Continuous Delivery
on: 
  push:
    branches: 
      - main
      - entrega-docker-final
  pull_request:
    branches: 
      - main

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      
      - name: Simulando Continuous Delivery
        uses: actions/upload-artifact@v4
        with:
          name: projeto-ecowatch.zip
          path: |
            **.py
            README.md
            Dockerfile

  docker-build-test:
    name: Validar Dockerfile
    runs-on: ubuntu-latest
    needs: deliver
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false 
          tags: igorfiori/ecowatch:test

  deploy: 
    runs-on: ubuntu-latest
    needs: docker-build-test
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Simulando Deployment
        run: |
          echo "Iniciando implantação do artefato..."
          echo "Status: Sucesso!"