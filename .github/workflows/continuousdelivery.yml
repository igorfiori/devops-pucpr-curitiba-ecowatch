name: Continuous Delivery
on: 
  push:
    branches: 
      - main
      - creation-continuous-deployment
  pull_request:
    branches: 
      - main

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      
      - name: Simulando Continuous Delivery
        uses: actions/upload-artifact@v4
        with:
          name: projeto-ecowatch.zip
          path: |
            **.py
            README.md

  deploy: 
    runs-on: ubuntu-latest
    needs: deliver
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Simulando Deployment
        run: |
          echo "Iniciando implantação do artefato..."
          echo "Status: Sucesso!"